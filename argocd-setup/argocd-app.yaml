apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: distritask-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ahmedr0001/DistriTask-K8s.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: distritask
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
