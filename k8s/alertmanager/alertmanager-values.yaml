alertmanager:
  config:
    global:
      slack_api_url: "###" 
    route:
      receiver: 'slack-notifications'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      routes:
      - match:
          alertname: NodeJsApplicationDown
        receiver: 'slack-notifications'
    receivers:
    - name: 'slack-notifications'
      slack_configs:
      - channel: '#k8s-alert' 
        send_resolved: true 
        title: '{{ template "slack.default.title" . }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* `{{ .Labels.severity }}`
          {{ end }}
